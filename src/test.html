<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LightHouse</title>
    <style>
      :root {
        --text: #111;
        --muted: #9aa0a6;
        --line: #e6e6e6;

        --bad: #ff6b57;
        --good: #1fb66a;

        --ring: 3px;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo",
          "Noto Sans KR", Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        color: var(--text);
        background: #111; /* 바깥 여백(스크린샷 느낌) */
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      /* 폰 프레임(필요 없으면 제거 가능) */
      .phone {
        width: min(420px, 92vw);
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }

      .screen {
        padding: 28px 22px 32px;
      }

      /* 상단 로고 */
      .brand {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin: 6px 0 26px;
      }
      .brand__mark {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: #ffd24d;
        display: grid;
        place-items: center;
        box-shadow: inset 0 0 0 2px #111;
        flex: 0 0 auto;
      }
      .brand__mark svg { display: block; }
      .brand__name {
        font-weight: 800;
        letter-spacing: -0.2px;
        font-size: 22px;
      }

      /* 질문 블록 */
      .q {
        margin-top: 18px;
      }
      .q__text {
        text-align: center;
        font-size: 18px;
        line-height: 1.55;
        letter-spacing: -0.2px;
        margin: 0 0 18px;
        white-space: pre-line;
      }

      /* 5점 척도 */
      .scale {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: end;
        gap: 14px;
        margin: 0 auto 22px;
        max-width: 340px;
      }
      .scale__label {
        font-size: 13px;
        color: #333;
      }
      .scale__label--left { justify-self: start; }
      .scale__label--right { justify-self: end; }

      .scale__choices {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        padding: 0 2px;
      }

      /* 라디오 숨기고 커스텀 원형 버튼 */
      .scale input[type="radio"] {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .dot {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        display: inline-grid;
        place-items: center;
        cursor: pointer;
        user-select: none;
        transition: transform 120ms ease, filter 120ms ease;
      }
      .dot:active { transform: scale(0.96); }

      /* 상태별 스타일 (스크린샷처럼: 좌측 2개 붉은 링, 가운데 회색, 우측 2개 초록) */
      .dot--bad  { box-shadow: inset 0 0 0 var(--ring) rgba(255,107,87,0.55); }
      .dot--bad2 { box-shadow: inset 0 0 0 var(--ring) rgba(255,107,87,0.45); width: 30px; height: 30px; }

      .dot--mid  { box-shadow: inset 0 0 0 var(--ring) rgba(154,160,166,0.35); width: 28px; height: 28px; }

      .dot--good2 { box-shadow: inset 0 0 0 var(--ring) rgba(31,182,106,0.60); }
      .dot--good  { background: rgba(31,182,106,0.80); }

      /* 선택되면 조금 더 진하게 */
      .scale input[type="radio"]:checked + .dot {
        filter: saturate(1.2) contrast(1.05);
        box-shadow: inset 0 0 0 4px rgba(17,17,17,0.12),
          0 10px 24px rgba(0,0,0,0.08);
      }
      .scale input[type="radio"]:focus-visible + .dot {
        outline: 3px solid rgba(0, 115, 255, 0.35);
        outline-offset: 3px;
      }

      /* 구분선(없어도 됨) */
      .divider {
        height: 1px;
        background: transparent;
        margin: 8px 0;
      }
    </style>
  </head>

  <body>
    <main class="phone" role="main">
      <section class="screen">
        <header class="brand" aria-label="LightHouse">
          <div class="brand__mark" aria-hidden="true">
            <!-- 간단한 등대 아이콘 -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 2l3 4H9l3-4Z" fill="#111"/>
              <path d="M10 6h4l-1 5h-2l-1-5Z" fill="#111"/>
              <path d="M9 11h6l-1.2 11H10.2L9 11Z" fill="#111"/>
              <path d="M5 9l4-2M19 9l-4-2" stroke="#111" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="brand__name">LightHouse</div>
        </header>

        <!-- Q1 -->
        <section class="q">
          <p class="q__text">나는 익숙한 것보다 새로운 것에
더 쉽게 끌린다.</p>

          <form class="scale" aria-label="질문 1 응답">
            <div class="scale__label scale__label--left">아니다</div>

            <div class="scale__choices" role="radiogroup" aria-label="1~5 선택">
              <label>
                <input type="radio" name="q1" value="1" />
                <span class="dot dot--bad" aria-hidden="true"></span>
              </label>
              <label>
                <input type="radio" name="q1" value="2" />
                <span class="dot dot--bad2" aria-hidden="true"></span>
              </label>
              <label>
                <input type="radio" name="q1" value="3" />
                <span class="dot dot--mid" aria-hidden="true"></span>
              </label>
              <label>
                <input type="radio" name="q1" value="4" />
                <span class="dot dot--good2" aria-hidden="true"></span>
              </label>
              <label>
                <input type="radio" name="q1" value="5" />
                <span class="dot dot--good" aria-hidden="true"></span>
              </label>
            </div>

            <div class="scale__label scale__label--right">그렇다</div>
          </form>
        </section>

        <div class="divider"></div>

        <!-- Q2 -->
        <section class="q">
          <p class="q__text">어려운 문제에 직면했을 때,
“나는 할 수 있다”고 생각하는 편이다.</p>

          <form class="scale" aria-label="질문 2 응답">
            <div class="scale__label scale__label--left">아니다</div>

            <div class="scale__choices" role="radiogroup" aria-label="1~5 선택">
              <label>
                <input type="radio" name="q2" value="1" />
                <span class="dot dot--bad" aria-hidden="true"></span>
              </label>
              <label>
                <input type="radio" name="q2" value="2" />
                <span class="dot dot--bad2" aria-hidden="true"></span>
              </label>
              <label>
                <input type="radio" name="q2" value="3" />
                <span class="dot dot--mid" aria-hidden="true"></span>
              </label>
              <label>
                <input type="radio" name="q2" value="4" checked />
                <span class="dot dot--good" aria-hidden="true"></span>
              </label>
              <label>
                <input type="radio" name="q2" value="5" />
                <span class="dot dot--good2" aria-hidden="true"></span>
              </label>
            </div>

            <div class="scale__label scale__label--right">그렇다</div>
          </form>
        </section>
      </section>
    </main>
  </body>
</html>
